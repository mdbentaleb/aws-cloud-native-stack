services:
  web-app:
    build: ./app
    image: flask-app-img
    container_name: flaskAppCont
    restart: always
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    container_name: nginxCont
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
    depends_on:
      - web-app